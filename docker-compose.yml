version: "3.9"

# ═══════════════════════════════════════════════════════
#  Chaghaf Monolith — Stack simplifiée
#  Un seul JAR + Kafka + Zookeeper
#  PostgreSQL est sur Render Cloud
# ═══════════════════════════════════════════════════════

networks:
  chaghaf-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:

services:

  # ── Zookeeper ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: chaghaf-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: chaghaf-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - chaghaf-net
    restart: unless-stopped

  # ── Application Monolithe (1 seul conteneur) ──────────
  chaghaf-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chaghaf-monolith
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL Render
      DB_HOST: ${DB_HOST:-dpg-d7f7dcdckfvc73dopob0-a}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-chaghaf_bd}
      DB_USER: ${DB_USER:-chaghaf_bd_user}
      DB_PASS: ${DB_PASS:-FWRaguZzbhJbKFQ4JxhEtjmP6g8E7Jjr}
      # Kafka
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
      # JWT
      JWT_SECRET: ${JWT_SECRET:-chaghaf-super-secret-key-2025-agadir-morocco-production}
      # Firebase (optionnel)
      FIREBASE_CREDENTIALS: /app/config/firebase-service-account.json
    volumes:
      - ./config/firebase-service-account.json:/app/config/firebase-service-account.json:ro
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - chaghaf-net
    restart: unless-stopped
